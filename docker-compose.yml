version: '3.8'

services:
  dataops-agent:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./data/outputs:/app/data/outputs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
